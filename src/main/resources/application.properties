spring.application.name=migracao-eagle

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/migration-control;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=80MB

app.migration.work-dir=${APP_MIGRATION_WORK_DIR:/tmp/migracao-eagle}
app.migration.firebird.enabled=${APP_MIGRATION_FIREBIRD_ENABLED:true}
app.migration.clean-database.s3.bucket=${MIGRATION_CLEAN_DB_S3_BUCKET:eagle-migracao-templates}
app.migration.clean-database.s3.region=${AWS_REGION:sa-east-1}
app.migration.clean-database.cache-dir=${APP_MIGRATION_CLEAN_DB_CACHE_DIR:/tmp/migracao-eagle/templates}
app.migration.clean-database.templates[0].version=2025.001
app.migration.clean-database.templates[0].description=Eagle Gestao 2025.001
app.migration.clean-database.templates[0].s3-key=bancos-limpos/2025.001/EAGLEERP_LIMPO.FDB
app.migration.clean-database.templates[1].version=2025.002
app.migration.clean-database.templates[1].description=Eagle Gestao 2025.002
app.migration.clean-database.templates[1].s3-key=bancos-limpos/2025.002/EAGLEERP_LIMPO.FDB
app.migration.clean-database.templates[2].version=2026.001
app.migration.clean-database.templates[2].description=Eagle Gestao 2026.001
app.migration.clean-database.templates[2].s3-key=bancos-limpos/2026.001/EAGLEERP_LIMPO.FDB
app.migration.final-database.s3.bucket=${MIGRATION_FINAL_DB_S3_BUCKET:${MIGRATION_CLEAN_DB_S3_BUCKET:eagle-migracao-templates}}
app.migration.final-database.s3.region=${AWS_REGION:sa-east-1}
app.migration.final-database.s3.prefix=${MIGRATION_FINAL_DB_S3_PREFIX:bancos-migrados}
app.migration.final-database.download-cache-dir=${APP_MIGRATION_FINAL_DB_DOWNLOAD_CACHE_DIR:/tmp/migracao-eagle/downloads}
app.migration.firebird.jdbc-url=${APP_MIGRATION_FIREBIRD_JDBC_URL:jdbc:firebirdsql://firebird:3050/{database}}
app.migration.firebird.username=${APP_MIGRATION_FIREBIRD_USERNAME:SYSDBA}
app.migration.firebird.password=${APP_MIGRATION_FIREBIRD_PASSWORD:}
app.migration.firebird.migrator-database=${APP_MIGRATION_FIREBIRD_MIGRATOR_DATABASE:/firebird/data/MIGRADOR.FDB}
app.migration.firebird.eagle-alias-name=${APP_MIGRATION_FIREBIRD_EAGLE_ALIAS_NAME:EAGLEERP}
app.migration.firebird.table-map.CLIENTES=CLIENTES
app.migration.firebird.table-map.FORNECEDORES=FORNECEDORES
app.migration.firebird.table-map.PRODUTOS=ESTOQUE
app.migration.firebird.table-map.ARECEBER=ARECEBER
app.migration.firebird.table-map.APAGAR=APAGAR
