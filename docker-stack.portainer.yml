services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: migracao_eagle
      POSTGRES_USER: migracao_eagle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migracao_eagle -d migracao_eagle"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - migracao-eagle
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  firebird:
    image: jacobalberty/firebird:2.5-ss
    environment:
      ISC_PASSWORD: ${APP_MIGRATION_FIREBIRD_PASSWORD}
    volumes:
      - type: bind
        source: /opt/migracao-eagle/firebird
        target: /firebird/data
      - type: bind
        source: /opt/migracao-eagle/firebird/aliases.conf
        target: /firebird/etc/aliases.conf
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/firebird/bin/isql -user SYSDBA -password ${APP_MIGRATION_FIREBIRD_PASSWORD} /firebird/data/MIGRADOR.FDB -q >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - migracao-eagle
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  backend:
    image: ghcr.io/raylann-lopes/migracao-eagle-backend:${IMAGE_TAG:-latest}
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/migracao_eagle
      SPRING_DATASOURCE_USERNAME: migracao_eagle
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MIGRATION_CLEAN_DB_S3_BUCKET: ${MIGRATION_CLEAN_DB_S3_BUCKET}
      MIGRATION_CLEAN_DB_2025_001_S3_KEY: ${MIGRATION_CLEAN_DB_2025_001_S3_KEY}
      MIGRATION_CLEAN_DB_2025_002_S3_KEY: ${MIGRATION_CLEAN_DB_2025_002_S3_KEY}
      MIGRATION_CLEAN_DB_2026_001_S3_KEY: ${MIGRATION_CLEAN_DB_2026_001_S3_KEY}
      MIGRATION_FINAL_DB_S3_BUCKET: ${MIGRATION_FINAL_DB_S3_BUCKET}
      MIGRATION_FINAL_DB_S3_PREFIX: ${MIGRATION_FINAL_DB_S3_PREFIX}
      APP_MIGRATION_WORK_DIR: /firebird/data/work
      APP_MIGRATION_FIREBIRD_ENABLED: "true"
      APP_MIGRATION_FIREBIRD_JDBC_URL: jdbc:firebirdsql://firebird:3050/{database}?enableProtocol=*&wireCrypt=disabled
      APP_MIGRATION_FIREBIRD_USERNAME: SYSDBA
      APP_MIGRATION_FIREBIRD_PASSWORD: ${APP_MIGRATION_FIREBIRD_PASSWORD}
      APP_MIGRATION_FIREBIRD_MIGRATOR_DATABASE: /firebird/data/MIGRADOR.FDB
      APP_MIGRATION_FIREBIRD_EAGLE_ALIAS_NAME: EAGLEERP
      JAVA_OPTS: -Xms256m -Xmx1024m
    volumes:
      - type: bind
        source: /opt/migracao-eagle/firebird
        target: /firebird/data
    networks:
      - migracao-eagle
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    image: ghcr.io/raylann-lopes/migracao-eagle-frontend:${IMAGE_TAG:-latest}
    networks:
      - migracao-eagle
      - traefik-public
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.docker.network=${TRAEFIK_NETWORK}
        - traefik.http.routers.eagle-migration.rule=Host(`${APP_DOMAIN}`)
        - traefik.http.routers.eagle-migration.entrypoints=${TRAEFIK_HTTPS_ENTRYPOINT}
        - traefik.http.routers.eagle-migration.tls=true
        - traefik.http.routers.eagle-migration.tls.certresolver=${TRAEFIK_CERT_RESOLVER}
        - traefik.http.services.eagle-migration.loadbalancer.server.port=80
      restart_policy:
        condition: on-failure

volumes:
  postgres-data:

networks:
  migracao-eagle:
    driver: overlay
  traefik-public:
    external: true
    name: ${TRAEFIK_NETWORK}
