spring.application.name=migracao-eagle

spring.datasource.url=jdbc:h2:file:./data/migration-control;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=80MB

app.migration.firebird.enabled=false
app.migration.clean-database-template-path=./data/templates/EAGLE_LIMPO.FDB
app.migration.eagle-working-database-path=./data/work/EAGLEERP.FDB
app.migration.final-database-output-dir=./data/final
app.migration.clean-database.s3.bucket=${MIGRATION_CLEAN_DB_S3_BUCKET:eagle-migracao-templates}
app.migration.clean-database.s3.region=${AWS_REGION:sa-east-1}
app.migration.clean-database.cache-dir=${APP_MIGRATION_CLEAN_DB_CACHE_DIR:./data/cache/templates}
app.migration.clean-database.templates[0].version=2025.001
app.migration.clean-database.templates[0].description=Eagle Gestao 2025.001
app.migration.clean-database.templates[0].s3-key=bancos-limpos/2025.001/EAGLEERP_LIMPO.FDB
app.migration.clean-database.templates[1].version=2025.002
app.migration.clean-database.templates[1].description=Eagle Gestao 2025.002
app.migration.clean-database.templates[1].s3-key=bancos-limpos/2025.002/EAGLEERP_LIMPO.FDB
app.migration.clean-database.templates[1].local-path=${APP_MIGRATION_CLEAN_DB_2025_002_LOCAL_PATH:./data/templates/2025.002/EAGLEERP_LIMPO.FDB}
app.migration.clean-database.templates[2].version=2026.001
app.migration.clean-database.templates[2].description=Eagle Gestao 2026.001
app.migration.clean-database.templates[2].s3-key=bancos-limpos/2026.001/EAGLEERP_LIMPO.FDB
app.migration.firebird.jdbc-url=jdbc:firebirdsql://localhost:3050/{database}
app.migration.firebird.username=SYSDBA
app.migration.firebird.password=masterkey
app.migration.firebird.migrator-database=${APP_MIGRATION_FIREBIRD_MIGRATOR_DATABASE:./data/MIGRADOR.FDB}
app.migration.firebird.eagle-alias-name=EAGLEERP
app.migration.firebird.table-map.CLIENTES=CLIENTES
app.migration.firebird.table-map.FORNECEDORES=FORNECEDORES
app.migration.firebird.table-map.PRODUTOS=ESTOQUE
app.migration.firebird.table-map.ARECEBER=ARECEBER
app.migration.firebird.table-map.APAGAR=APAGAR
