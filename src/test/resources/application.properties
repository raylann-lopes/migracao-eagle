spring.datasource.url=jdbc:h2:mem:migration-control-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false
app.migration.firebird.enabled=false
app.migration.work-dir=./target/test-data/work
app.migration.clean-database.cache-dir=./target/test-data/templates
app.migration.final-database.s3.bucket=test-bucket
app.migration.final-database.s3.prefix=bancos-migrados
app.migration.final-database.download-cache-dir=./target/test-data/downloads
