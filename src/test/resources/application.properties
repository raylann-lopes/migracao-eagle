spring.datasource.url=jdbc:h2:mem:migration-control-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false
app.migration.firebird.enabled=false
app.migration.clean-database-template-path=./target/test-data/templates/EAGLE_LIMPO.FDB
app.migration.eagle-working-database-path=./target/test-data/work/EAGLEERP.FDB
app.migration.final-database-output-dir=./target/test-data/final
